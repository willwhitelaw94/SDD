<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk Radar — Linear Lisa — Step Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: {
              50: '#F0FAFA', 100: '#D5F1F0', 200: '#BAE8E7', 300: '#94DBDA',
              400: '#66CCCA', 500: '#43C0BE', 600: '#2F9E9C', 700: '#007F7E',
              800: '#005656', 900: '#003D3D'
            },
            'primary-blue': {
              50: '#F0F4FA', 100: '#D6E1F0', 200: '#BCCEE7', 300: '#96B2D9',
              400: '#7197CC', 500: '#4B7BBE', 600: '#39639D', 700: '#2C4C79',
              800: '#1E3452', 900: '#101C2D'
            },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .kbd {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; padding: 0 5px;
      font-size: 10px; font-family: inherit; font-weight: 500;
      color: #9CA3AF; background: #F3F4F6; border: 1px solid #E5E7EB;
      border-radius: 4px; line-height: 1;
    }
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
    }
    .modal-enter {
      animation: modalIn 0.2s ease-out;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    textarea:focus {
      outline: none;
      border-color: #007F7E;
      box-shadow: 0 0 0 3px rgba(0, 127, 126, 0.08);
    }
    .step-line {
      height: 2px;
      transition: background 0.3s ease;
    }
  </style>
</head>
<body class="bg-gray-50 flex">

<!-- Skeleton sidebar -->
<aside class="w-60 bg-white border-r border-gray-200 flex flex-col shrink-0 h-screen sticky top-0">
    <div class="px-4 py-4 border-b border-gray-100">
        <div class="flex items-center gap-2.5">
            <div class="h-8 w-8 rounded-lg bg-gray-200 animate-pulse"></div>
            <div class="h-4 w-24 rounded bg-gray-200 animate-pulse"></div>
        </div>
        <p class="mt-2 text-[9px] text-gray-300 uppercase tracking-widest text-center">Framing only</p>
    </div>
    <div class="px-3 py-3">
        <div class="h-8 rounded-lg bg-gray-100 animate-pulse"></div>
    </div>
    <nav class="flex-1 overflow-y-auto px-3 py-2 space-y-1.5">
        <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-20 rounded bg-gray-200 animate-pulse"></div></div>
        <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-24 rounded bg-gray-200 animate-pulse"></div></div>
        <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-16 rounded bg-gray-200 animate-pulse"></div></div>
        <div class="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-teal-50"><div class="h-4 w-4 rounded bg-teal-200 animate-pulse"></div><div class="h-3.5 w-18 rounded bg-teal-200 animate-pulse"></div></div>
        <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-20 rounded bg-gray-200 animate-pulse"></div></div>
    </nav>
    <div class="border-t border-gray-100 px-3 py-3">
        <div class="flex items-center gap-2.5">
            <div class="h-8 w-8 rounded-full bg-gray-200 animate-pulse"></div>
            <div class="flex-1 space-y-1.5"><div class="h-3 w-24 rounded bg-gray-200 animate-pulse"></div><div class="h-2.5 w-20 rounded bg-gray-100 animate-pulse"></div></div>
        </div>
    </div>
</aside>

<!-- Main content (dimmed) -->
<main class="flex-1 flex flex-col min-h-screen relative">
    <!-- Page header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 opacity-50">
        <nav class="text-xs text-gray-400 mb-1">
            <span>Packages</span> <span class="mx-1">/</span>
            <span>Mrs Margaret Smith</span> <span class="mx-1">/</span>
            <span class="text-gray-700 font-medium">Risks</span>
        </nav>
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-semibold text-gray-900">Risk Profile</h1>
            </div>
        </div>
    </header>

    <!-- Tab bar (dimmed) -->
    <div class="bg-white border-b border-gray-200 px-6 opacity-50">
        <div class="flex gap-6">
            <button class="py-3 text-sm font-medium text-teal-700 border-b-2 border-teal-700 -mb-px">All Risks</button>
            <button class="py-3 text-sm font-medium text-gray-400">Risk Radar</button>
        </div>
    </div>

    <!-- Dimmed content behind modal -->
    <div class="flex-1 p-6 opacity-30">
        <div class="space-y-3 max-w-3xl">
            <div class="bg-white border border-gray-200 rounded-lg h-24"></div>
            <div class="bg-white border border-gray-200 rounded-lg h-24"></div>
        </div>
    </div>

    <!-- Modal backdrop -->
    <div class="modal-backdrop fixed inset-0 z-40 flex items-center justify-center">

        <!-- Modal -->
        <div class="modal-enter bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 flex flex-col max-h-[85vh]">

            <!-- Modal header -->
            <div class="px-6 pt-6 pb-4 border-b border-gray-100">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-base font-semibold text-gray-900">Add Risk</h2>
                    <div class="flex items-center gap-2">
                        <span class="kbd">Esc</span>
                        <button class="p-1 rounded hover:bg-gray-100 transition-colors text-gray-400 hover:text-gray-600">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Step navigation -->
                <div class="flex items-center justify-center gap-0">
                    <!-- Step 1: Completed -->
                    <div class="flex items-center gap-2">
                        <div class="w-7 h-7 rounded-full bg-green-500 flex items-center justify-center shrink-0">
                            <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                        </div>
                        <span class="text-xs font-medium text-green-600">Basics</span>
                    </div>

                    <!-- Line 1-2 -->
                    <div class="step-line w-12 bg-green-300 mx-3"></div>

                    <!-- Step 2: Current -->
                    <div class="flex items-center gap-2">
                        <div class="w-7 h-7 rounded-full bg-teal-700 flex items-center justify-center shrink-0">
                            <span class="text-xs font-semibold text-white">2</span>
                        </div>
                        <span class="text-xs font-medium text-teal-700">Details</span>
                    </div>

                    <!-- Line 2-3 -->
                    <div class="step-line w-12 bg-gray-200 mx-3"></div>

                    <!-- Step 3: Upcoming -->
                    <div class="flex items-center gap-2">
                        <div class="w-7 h-7 rounded-full bg-gray-100 border-2 border-gray-200 flex items-center justify-center shrink-0">
                            <span class="text-xs font-medium text-gray-400">3</span>
                        </div>
                        <span class="text-xs font-medium text-gray-400">Check-In Questions</span>
                    </div>
                </div>
            </div>

            <!-- Modal body -->
            <div class="px-6 py-5 flex-1 overflow-y-auto">
                <div class="space-y-5">

                    <!-- Need field -->
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1.5">
                            Need
                            <span class="text-red-400">*</span>
                        </label>
                        <textarea
                            class="w-full px-3 py-2.5 text-sm text-gray-900 bg-white border border-gray-200 rounded-lg resize-none placeholder:text-gray-400 transition-all"
                            rows="2"
                            placeholder="What is the client's care need related to this risk?"
                        >Client requires support with falls prevention due to history of recurrent falls and reduced mobility.</textarea>
                    </div>

                    <!-- Details field -->
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1.5">
                            Details
                        </label>
                        <textarea
                            class="w-full px-3 py-2.5 text-sm text-gray-900 bg-white border border-gray-200 rounded-lg resize-none placeholder:text-gray-400 transition-all"
                            rows="3"
                            placeholder="Provide additional context, history, or relevant clinical details..."
                        ></textarea>
                    </div>

                    <!-- Action Plan field -->
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1.5">
                            Action Plan
                        </label>
                        <textarea
                            class="w-full px-3 py-2.5 text-sm text-gray-900 bg-white border border-gray-200 rounded-lg resize-none placeholder:text-gray-400 transition-all"
                            rows="3"
                            placeholder="What actions will be taken to manage or mitigate this risk?"
                        ></textarea>
                    </div>

                    <!-- Not identified toggle -->
                    <div class="flex items-center justify-between py-2 border-t border-gray-100">
                        <div>
                            <span class="text-xs font-medium text-gray-700">Not identified during assessment</span>
                            <p class="text-[11px] text-gray-400 mt-0.5">Mark if this risk was not found during initial assessment</p>
                        </div>
                        <!-- Toggle switch -->
                        <button class="relative w-9 h-5 rounded-full bg-gray-200 transition-colors focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2" onclick="toggleSwitch(this)">
                            <span class="absolute left-0.5 top-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform"></span>
                        </button>
                    </div>

                </div>
            </div>

            <!-- Modal footer -->
            <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
                <button class="inline-flex items-center gap-1.5 px-4 py-2 text-xs font-medium text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Back
                </button>
                <div class="flex items-center gap-3">
                    <span class="text-[11px] text-gray-400"><span class="kbd">Tab</span> to navigate</span>
                    <button class="inline-flex items-center gap-1.5 px-4 py-2 text-xs font-medium text-white bg-teal-700 rounded-lg hover:bg-teal-800 transition-colors">
                        Next
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>

        </div>
    </div>
</main>

<script>
function toggleSwitch(btn) {
    const dot = btn.querySelector('span');
    const isOn = btn.classList.contains('bg-teal-700');
    if (isOn) {
        btn.classList.remove('bg-teal-700');
        btn.classList.add('bg-gray-200');
        dot.style.transform = 'translateX(0)';
    } else {
        btn.classList.remove('bg-gray-200');
        btn.classList.add('bg-teal-700');
        dot.style.transform = 'translateX(16px)';
    }
}
</script>

</body>
</html>
