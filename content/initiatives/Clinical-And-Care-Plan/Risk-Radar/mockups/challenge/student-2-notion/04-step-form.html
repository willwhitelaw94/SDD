<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step-Based Risk Form | Notion Nick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: {
              50: '#F0FAFA', 100: '#D5F1F0', 200: '#BAE8E7', 300: '#94DBDA',
              400: '#66CCCA', 500: '#43C0BE', 600: '#2F9E9C', 700: '#007F7E',
              800: '#005656', 900: '#003D3D'
            },
            'primary-blue': {
              50: '#F0F4FA', 100: '#D6E1F0', 200: '#BCCEE7', 300: '#96B2D9',
              400: '#7197CC', 500: '#4B7BBE', 600: '#39639D', 700: '#2C4C79',
              800: '#1E3452', 900: '#101C2D'
            },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
    </script>
    <style>
        .step-dot { transition: all 0.15s ease; }
        .step-dot.active { background-color: #007F7E; color: white; }
        .step-dot.completed { background-color: #007F7E; color: white; }
        .step-connector.completed { background-color: #BAE8E7; }
        .notion-textarea { transition: border-color 0.15s ease, box-shadow 0.15s ease; }
        .notion-textarea:focus { border-color: #007F7E; box-shadow: 0 0 0 3px rgba(0, 127, 126, 0.1); }
        .slash-hint { animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }
    </style>
</head>
<body class="h-full bg-stone-50 font-sans text-gray-800 antialiased flex">
    <!-- Skeleton Sidebar -->
    <aside class="w-60 bg-white border-r border-gray-200 flex flex-col shrink-0 h-screen sticky top-0">
        <div class="px-4 py-4 border-b border-gray-100">
            <div class="flex items-center gap-2.5">
                <div class="h-8 w-8 rounded-lg bg-gray-200 animate-pulse"></div>
                <div class="h-4 w-24 rounded bg-gray-200 animate-pulse"></div>
            </div>
            <p class="mt-2 text-[9px] text-gray-300 uppercase tracking-widest text-center">Framing only</p>
        </div>
        <div class="px-3 py-3"><div class="h-8 rounded-lg bg-gray-100 animate-pulse"></div></div>
        <nav class="flex-1 overflow-y-auto px-3 py-2 space-y-1.5">
            <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-20 rounded bg-gray-200 animate-pulse"></div></div>
            <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-24 rounded bg-gray-200 animate-pulse"></div></div>
            <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-16 rounded bg-gray-200 animate-pulse"></div></div>
            <div class="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-teal-50"><div class="h-4 w-4 rounded bg-teal-200 animate-pulse"></div><div class="h-3.5 w-18 rounded bg-teal-200 animate-pulse"></div></div>
            <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-20 rounded bg-gray-200 animate-pulse"></div></div>
        </nav>
        <div class="border-t border-gray-100 px-3 py-3">
            <div class="flex items-center gap-2.5">
                <div class="h-8 w-8 rounded-full bg-gray-200 animate-pulse"></div>
                <div class="flex-1 space-y-1.5"><div class="h-3 w-24 rounded bg-gray-200 animate-pulse"></div><div class="h-2.5 w-20 rounded bg-gray-100 animate-pulse"></div></div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-h-screen">
        <!-- Page Header -->
        <header class="bg-white border-b border-gray-200 px-8 py-5">
            <nav class="text-[13px] text-gray-400 mb-2">
                <span class="hover:text-gray-500 cursor-pointer">Packages</span>
                <span class="mx-1.5">/</span>
                <span class="hover:text-gray-500 cursor-pointer">Mrs Margaret Smith</span>
                <span class="mx-1.5">/</span>
                <span class="hover:text-gray-500 cursor-pointer">Risks</span>
                <span class="mx-1.5">/</span>
                <span class="text-gray-700 font-medium">New Risk</span>
            </nav>
            <div class="flex items-center justify-between">
                <h1 class="text-[22px] font-semibold text-gray-900">New Risk</h1>
                <button class="text-[13px] text-gray-400 hover:text-gray-600 px-3 py-1.5 rounded-lg hover:bg-gray-100 transition-colors">Cancel</button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 px-8 py-8">
            <div class="max-w-2xl mx-auto">
                <!-- Step breadcrumb indicator -->
                <div class="flex items-center mb-8">
                    <!-- Step 1: Completed -->
                    <div class="flex items-center">
                        <div class="step-dot completed w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold">
                            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                        </div>
                        <span class="ml-2 text-[13px] font-medium text-teal-700">Basics</span>
                    </div>
                    <div class="step-connector completed flex-1 h-0.5 bg-teal-200 mx-3"></div>
                    <!-- Step 2: Active -->
                    <div class="flex items-center">
                        <div class="step-dot active w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold">2</div>
                        <span class="ml-2 text-[13px] font-medium text-teal-700">Details</span>
                    </div>
                    <div class="step-connector flex-1 h-0.5 bg-gray-200 mx-3"></div>
                    <!-- Step 3: Pending -->
                    <div class="flex items-center">
                        <div class="step-dot w-7 h-7 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center text-xs font-bold">3</div>
                        <span class="ml-2 text-[13px] font-medium text-gray-400">Check-In Questions</span>
                    </div>
                </div>

                <!-- Page-as-Form card -->
                <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                    <!-- Page icon + title area -->
                    <div class="p-8 pb-6">
                        <div class="flex items-center gap-3 mb-1">
                            <div class="w-10 h-10 rounded-xl bg-teal-50 border border-teal-100 flex items-center justify-center text-xl">&#x1F9B6;</div>
                            <div>
                                <h2 class="text-lg font-semibold text-gray-900">Risk Details</h2>
                                <p class="text-[12px] text-gray-400">Step 2 of 3 -- Describe the risk and plan</p>
                            </div>
                        </div>
                    </div>

                    <!-- Property panel (from Step 1 -- read-only summary) -->
                    <div class="px-8 pb-5">
                        <div class="bg-stone-50 rounded-xl p-5 space-y-3">
                            <div class="flex items-center">
                                <span class="text-[12px] text-gray-400 font-medium w-32">Category</span>
                                <div class="flex items-center gap-1.5">
                                    <span class="text-lg">&#x1F9B6;</span>
                                    <span class="text-[14px] text-gray-800 font-medium">Falls</span>
                                </div>
                            </div>
                            <div class="flex items-center">
                                <span class="text-[12px] text-gray-400 font-medium w-32">Domain</span>
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-lg bg-blue-50 text-[11px] font-medium text-blue-700 border border-blue-100">Safety</span>
                            </div>
                            <div class="flex items-center">
                                <span class="text-[12px] text-gray-400 font-medium w-32">In Care Plan</span>
                                <div class="flex items-center gap-1.5">
                                    <div class="w-4 h-4 rounded bg-teal-600 flex items-center justify-center">
                                        <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                                    </div>
                                    <span class="text-[13px] text-gray-600">Yes</span>
                                </div>
                            </div>
                            <div class="flex items-center">
                                <span class="text-[12px] text-gray-400 font-medium w-32">Status</span>
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-lg bg-teal-50 text-[11px] font-medium text-teal-700 border border-teal-100">Active</span>
                            </div>
                        </div>
                    </div>

                    <!-- Divider -->
                    <div class="px-8"><hr class="border-gray-100"></div>

                    <!-- Rich content area (page-as-form) -->
                    <div class="p-8 space-y-7">
                        <!-- Details heading + textarea -->
                        <div>
                            <h3 class="text-[14px] font-semibold text-gray-800 mb-2">Details</h3>
                            <textarea
                                class="notion-textarea w-full px-4 py-3.5 text-[14px] text-gray-800 rounded-xl border border-gray-200 outline-none resize-none leading-relaxed"
                                rows="4"
                                placeholder="Describe the risk -- what's happening, history, contributing factors..."
                            >History of recurrent falls -- 3 falls in the last 6 months, most recent resulted in a fractured wrist requiring ED visit. Uses a four-wheeled walker but sometimes forgets when getting up at night.</textarea>
                        </div>

                        <!-- Action Plan heading + textarea -->
                        <div>
                            <h3 class="text-[14px] font-semibold text-gray-800 mb-2">Action Plan</h3>
                            <textarea
                                class="notion-textarea w-full px-4 py-3.5 text-[14px] text-gray-800 rounded-xl border border-gray-200 outline-none resize-none leading-relaxed"
                                rows="3"
                                placeholder="What's the plan to manage this risk?"
                            >OT home assessment scheduled for 12 Mar. Falls prevention program referral sent. Walker compliance discussed with family.</textarea>
                        </div>

                        <!-- Slash command hint -->
                        <div class="slash-hint flex items-center gap-2 text-[12px] text-gray-300">
                            <span class="px-1.5 py-0.5 rounded bg-gray-100 text-gray-400 font-mono text-[10px]">/</span>
                            <span>Type to add more blocks...</span>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="px-8 py-5 bg-stone-50/70 border-t border-gray-100 flex items-center justify-between">
                        <button class="flex items-center gap-1.5 px-4 py-2.5 text-[13px] text-gray-500 hover:text-gray-700 hover:bg-white rounded-xl border border-transparent hover:border-gray-200 transition-all">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                            Back
                        </button>
                        <div class="flex items-center gap-3">
                            <button class="px-4 py-2.5 text-[13px] text-gray-500 hover:text-gray-700 rounded-xl hover:bg-white border border-transparent hover:border-gray-200 transition-all">
                                Save Draft
                            </button>
                            <button class="flex items-center gap-1.5 px-5 py-2.5 bg-teal-700 text-white text-[13px] font-medium rounded-xl hover:bg-teal-800 transition-colors shadow-sm">
                                Next
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
