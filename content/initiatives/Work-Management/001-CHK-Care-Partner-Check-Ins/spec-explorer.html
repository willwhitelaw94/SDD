<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spec Explorer — Care Partner Check-Ins</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#263348;--border:#334155;
  --teal:#007F7E;--teal-light:#43C0BE;--blue:#2C4C79;
  --p1:#ef4444;--p2:#fbbf24;--p3:#64748b;
  --given:#43C0BE;--when:#fbbf24;--then:#a78bfa;
  --text:#e2e8f0;--text-muted:#94a3b8;--text-dim:#64748b;
  --sidebar-w:320px;--detail-w:440px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
a{color:var(--teal-light);text-decoration:none}

/* Layout */
.app{display:flex;height:100vh;width:100vw}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:20}
.canvas-area{flex:1;position:relative;overflow:hidden}
.detail-panel{width:0;overflow:hidden;background:var(--surface);border-left:1px solid var(--border);transition:width .3s ease;z-index:20;display:flex;flex-direction:column}
.detail-panel.open{width:var(--detail-w);min-width:var(--detail-w)}
.prompt-bar{position:fixed;bottom:0;left:var(--sidebar-w);right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;z-index:30;display:flex;align-items:center;gap:12px;transition:right .3s ease}
.prompt-bar.detail-open{right:var(--detail-w)}

/* Sidebar */
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:14px;font-weight:700;color:var(--teal-light);margin-bottom:4px}
.sidebar-header .subtitle{font-size:11px;color:var(--text-muted)}
.sidebar-header .counts{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.sidebar-header .counts span{font-size:11px;padding:2px 8px;border-radius:9999px;background:var(--surface2)}
.count-p1{color:var(--p1)!important}.count-p2{color:var(--p2)!important}.count-p3{color:var(--p3)!important}
.search-box{padding:8px 16px}
.search-box input{width:100%;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;outline:none}
.search-box input:focus{border-color:var(--teal)}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border)}
.sidebar-tabs button{flex:1;padding:8px;font-size:12px;font-weight:600;background:none;border:none;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent}
.sidebar-tabs button.active{color:var(--teal-light);border-bottom-color:var(--teal-light)}
.sidebar-content{flex:1;overflow-y:auto;padding:8px}
.sidebar-content::-webkit-scrollbar{width:4px}
.sidebar-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Sidebar cards */
.s-card{padding:10px 12px;margin-bottom:6px;border-radius:8px;background:var(--bg);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.s-card:hover{border-color:var(--teal);background:var(--surface2)}
.s-card.selected{border-color:var(--teal-light);background:var(--surface2)}
.s-card-title{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.s-card-meta{font-size:11px;color:var(--text-muted);margin-top:4px;display:flex;gap:8px}
.priority-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.priority-dot.p1{background:var(--p1)}.priority-dot.p2{background:var(--p2)}.priority-dot.p3{background:var(--p3)}

/* FR cards */
.fr-group-header{font-size:11px;font-weight:700;padding:6px 12px;margin:8px 0 4px;border-radius:4px;color:#fff}
.fr-card{padding:8px 12px;margin-bottom:4px;border-radius:6px;background:var(--bg);border:1px solid var(--border);font-size:11px;cursor:pointer;transition:all .15s}
.fr-card:hover{border-color:var(--teal)}
.fr-card .fr-id{font-weight:700;color:var(--teal-light)}

/* Scenario cards */
.sc-card{padding:8px 12px;margin-bottom:4px;border-radius:6px;background:var(--bg);border:1px solid var(--border);font-size:11px;cursor:pointer;line-height:1.5}
.sc-card:hover{border-color:var(--teal)}
.sc-card .sc-parent{font-size:10px;color:var(--text-dim);margin-bottom:4px;font-weight:600}

/* Canvas */
.canvas{width:100%;height:100%;cursor:grab}
.canvas:active{cursor:grabbing}
.canvas-inner{transform-origin:0 0}

/* Story nodes */
.story-node{position:absolute;width:240px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:box-shadow .2s,border-color .2s;overflow:hidden;user-select:none}
.story-node:hover{border-color:var(--teal);box-shadow:0 0 20px rgba(67,192,190,.15)}
.story-node.selected{border-color:var(--teal-light);box-shadow:0 0 24px rgba(67,192,190,.25)}
.story-node .priority-stripe{height:4px;width:100%}
.story-node .priority-stripe.p1{background:var(--p1)}.story-node .priority-stripe.p2{background:var(--p2)}.story-node .priority-stripe.p3{background:var(--p3)}
.story-node .node-body{padding:12px}
.story-node .node-id{font-size:11px;font-weight:700;color:var(--teal-light)}
.story-node .node-title{font-size:12px;font-weight:600;margin-top:4px;line-height:1.4}
.story-node .node-actor{font-size:10px;color:var(--text-muted);margin-top:4px}
.story-node .node-stats{display:flex;gap:8px;margin-top:8px}
.story-node .node-stat{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--text-muted)}

/* Swim lanes */
.swim-lane{position:absolute;border:1px dashed var(--border);border-radius:12px;pointer-events:none}
.swim-lane-label{position:absolute;top:8px;left:16px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.swim-lane.p1{background:rgba(239,68,68,.03)}.swim-lane.p1 .swim-lane-label{color:var(--p1)}
.swim-lane.p2{background:rgba(251,191,36,.03)}.swim-lane.p2 .swim-lane-label{color:var(--p2)}
.swim-lane.p3{background:rgba(100,116,139,.03)}.swim-lane.p3 .swim-lane-label{color:var(--p3)}

/* Detail panel */
.detail-scroll{flex:1;overflow-y:auto;padding:20px}
.detail-scroll::-webkit-scrollbar{width:4px}
.detail-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.detail-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;z-index:5;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.detail-close:hover{background:var(--surface2);color:var(--text)}
.detail-header{margin-bottom:16px}
.detail-header .d-id{font-size:12px;color:var(--teal-light);font-weight:700}
.detail-header .d-title{font-size:16px;font-weight:700;margin-top:4px}
.detail-header .d-actor{font-size:12px;color:var(--text-muted);margin-top:4px}
.detail-header .d-priority{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;padding:4px 10px;border-radius:6px;background:var(--bg)}
.detail-header .d-stats{display:flex;gap:12px;margin-top:8px}
.detail-header .d-stats span{font-size:11px;color:var(--text-muted)}
.detail-section{margin-top:20px}
.detail-section h3{font-size:12px;font-weight:700;color:var(--teal-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail-rationale{font-size:12px;color:var(--text-muted);line-height:1.6;padding:10px;background:var(--bg);border-radius:6px}
.detail-deps{display:flex;flex-wrap:wrap;gap:6px}
.detail-dep{font-size:11px;padding:4px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.detail-dep:hover{border-color:var(--teal-light);color:var(--teal-light)}

/* Scenarios in detail */
.detail-scenario{padding:10px;margin-bottom:8px;background:var(--bg);border-radius:6px;font-size:12px;line-height:1.7}
.detail-scenario .kw-given{color:var(--given);font-weight:700}
.detail-scenario .kw-when{color:var(--when);font-weight:700}
.detail-scenario .kw-then{color:var(--then);font-weight:700}

/* FR badges in detail */
.detail-fr-list{display:flex;flex-wrap:wrap;gap:6px}
.detail-fr-badge{font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid;transition:all .15s}
.detail-fr-badge:hover{opacity:.8}

/* Edge cases */
.detail-edge{padding:10px;margin-bottom:6px;background:var(--bg);border-radius:6px;font-size:12px;line-height:1.5}
.detail-edge .edge-q{font-weight:600;color:var(--text)}
.detail-edge .edge-a{color:var(--text-muted);margin-top:4px}

/* Prompt bar */
.prompt-text{flex:1;font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prompt-text.has-prompt{color:var(--text)}
.prompt-copy{padding:8px 16px;border-radius:6px;background:var(--teal);color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.prompt-copy:hover{background:var(--teal-light);color:var(--bg)}
.prompt-copy.copied{background:#22c55e}

/* Tooltip */
.tooltip{position:fixed;max-width:320px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:11px;line-height:1.5;pointer-events:none;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.tooltip .tt-title{font-weight:700;margin-bottom:4px}.tooltip .tt-actor{color:var(--text-muted)}.tooltip .tt-rationale{color:var(--text-muted);margin-top:6px;font-style:italic}
.tooltip .tt-stats{display:flex;gap:8px;margin-top:6px}
.tooltip .tt-stats span{padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--text-muted);font-size:10px}

/* SVG arrows */
svg.arrows{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
svg.arrows path{fill:none;stroke:var(--border);stroke-width:1.5;marker-end:url(#arrowhead)}
svg.arrows path.highlighted{stroke:var(--teal-light);stroke-width:2}

/* Fit button */
.canvas-controls{position:absolute;top:12px;right:12px;display:flex;gap:6px;z-index:10}
.canvas-btn{padding:6px 12px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-size:11px;cursor:pointer;transition:all .15s}
.canvas-btn:hover{border-color:var(--teal);color:var(--text)}

/* Hidden utility */
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Care Partner Check-Ins</h1>
      <div class="subtitle">CHK — Work Management</div>
      <div class="counts">
        <span class="count-p1">4 P1</span>
        <span class="count-p2">6 P2</span>
        <span class="count-p3">2 P3</span>
        <span style="color:var(--teal-light)">26 FRs</span>
        <span style="color:var(--text-muted)">45 ACs</span>
      </div>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search stories, FRs, scenarios..." />
    </div>
    <div class="sidebar-tabs">
      <button class="active" data-tab="stories">Stories</button>
      <button data-tab="requirements">Requirements</button>
      <button data-tab="scenarios">Scenarios</button>
    </div>
    <div class="sidebar-content" id="sidebarContent"></div>
  </div>

  <!-- Canvas Area -->
  <div class="canvas-area">
    <div class="canvas-controls">
      <button class="canvas-btn" id="fitBtn">Fit All</button>
      <button class="canvas-btn" id="resetBtn">Reset</button>
    </div>
    <svg class="arrows" id="arrowsSvg">
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#334155"/>
        </marker>
        <marker id="arrowhead-hl" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#43C0BE"/>
        </marker>
      </defs>
    </svg>
    <div class="canvas" id="canvas">
      <div class="canvas-inner" id="canvasInner"></div>
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" id="detailClose">&times;</button>
    <div class="detail-scroll" id="detailScroll"></div>
  </div>
</div>

<!-- Prompt Bar -->
<div class="prompt-bar" id="promptBar">
  <div class="prompt-text" id="promptText">Select a story to generate an implementation prompt</div>
  <button class="prompt-copy" id="promptCopy">Copy Prompt</button>
</div>

<!-- Tooltip -->
<div class="tooltip hidden" id="tooltip"></div>

<script>
// ============================================================
// DATA
// ============================================================
const STORIES = [
  {
    id:'US1', title:'Care Partner Views Check-Ins on Dashboard', priority:'P1',
    actor:'Care Partner',
    rationale:'This is the entry point for the entire feature. Without visibility of what\'s due, care partners can\'t action check-ins. Replaces the coordination team\'s Excel spreadsheet as the source of truth.',
    scenarios:[
      {text:'Given a care partner with 5 clients who have overdue check-ins, When they open the Care Partner Dashboard, Then those 5 check-ins appear in the "Overdue" group of the My Activities panel with client name, due date, and days overdue.'},
      {text:'Given a care partner with a check-in due today, When they view My Activities, Then it appears in the "Today" group.'},
      {text:'Given a care partner with check-ins due in the next 30 days, When they view My Activities, Then those appear in the "Upcoming" group sorted by nearest due date.'},
      {text:'Given a check-in with 2 clinical questions attached, When the care partner views the check-in card, Then a question indicator shows "2 questions" on the card.'},
      {text:'Given a care partner with no check-ins due, When they view My Activities, Then a meaningful empty state displays (e.g., "No check-ins due — all caught up").'}
    ],
    frs:['FR-001','FR-006'],
    deps:['US3']
  },
  {
    id:'US2', title:'Care Partner Completes a Check-In', priority:'P1',
    actor:'Care Partner',
    rationale:'This is the core interaction — without a completion flow, the feature has no value. Replaces the unstructured "record a note with Check-In category" workflow.',
    scenarios:[
      {text:'Given a pending check-in for a client, When the care partner opens it, Then they see the client\'s name, package details, last check-in summary, and clinical questions inherited from the client\'s active risks.'},
      {text:'Given a client with 2 active risks each having a clinical question, When the care partner opens the check-in form, Then both risk-based questions appear and must be answered before submitting.'},
      {text:'Given a completed check-in, When submitted, Then the check-in status changes to "Completed", the completion date is recorded, the wellbeing rating (1-5) is saved, and a new check-in is scheduled based on the configured cadence (default: 3 months from completion).'},
      {text:'Given a client whose care partner has never completed a check-in before, When the care partner opens the check-in, Then the "Previous check-in" section shows "First check-in for this client" instead of a blank space.'},
      {text:'Given a care partner mid-call who needs to pause, When they partially fill in the form and navigate away, Then their progress is not lost (draft state preserved).'},
      {text:'Given a client with no active risks, When the care partner opens the check-in form, Then no clinical questions appear but the check-in can still be completed with summary notes and wellbeing rating.'}
    ],
    frs:['FR-001','FR-003','FR-004','FR-007','FR-023','FR-025'],
    deps:['US1']
  },
  {
    id:'US3', title:'System Auto-Generates Quarterly Check-Ins', priority:'P1',
    actor:'System',
    rationale:'Without automatic generation, someone would need to manually create ~5,000 check-ins per quarter across 15,000 clients. This is the engine that drives the feature.',
    scenarios:[
      {text:'Given an active client with a care partner assigned, When the quarterly generation runs, Then a check-in record is created with the due date 3 months from the client\'s last completed check-in (or commencement date if no prior check-in).'},
      {text:'Given a client whose cadence has been configured to monthly, When generation runs, Then the check-in is due 1 month from the last completed check-in, not 3 months.'},
      {text:'Given a client whose package has ended or been cancelled, When generation runs, Then no new check-in is created for that client.'},
      {text:'Given a client who already has a pending check-in, When generation runs, Then no duplicate check-in is created.'},
      {text:'Given a new client who commenced this week, When generation runs, Then their first check-in is created with a due date 3 months from their commencement date.'}
    ],
    frs:['FR-002','FR-010','FR-011','FR-013','FR-016','FR-021','FR-024'],
    deps:[]
  },
  {
    id:'US4', title:'Care Coordinator Views and Completes External Check-Ins', priority:'P1',
    actor:'Care Coordinator',
    rationale:'Both internal and external check-in types are required from day one. Coordinators need the same visibility and workflow as care partners. Third-party coordinators involved in client relationships need a formal touchpoint.',
    scenarios:[
      {text:'Given a care coordinator with clients assigned, When they view their dashboard, Then external check-ins appear in their activities panel with the same grouping as care partners.'},
      {text:'Given a coordinator completing an external check-in, When they open the form, Then coordinator-relevant fields are available (service satisfaction, provider feedback).'},
      {text:'Given a client with both a care partner and a coordinator, When each views their dashboard, Then they see their own check-in type only (internal or external).'}
    ],
    frs:['FR-001','FR-004','FR-006'],
    deps:['US3']
  },
  {
    id:'US5', title:'Clinical Team Defines Questions on Client Risks', priority:'P2',
    actor:'Clinical Team',
    rationale:'Closes the feedback loop between clinical team and care partners — the key differentiator from the old note-based system. Risk-based questions ensure clinically relevant information is gathered consistently across check-ins.',
    scenarios:[
      {text:'Given a client with an active risk record, When a clinical team member opens the risk, Then they can add one or more check-in questions to that risk.'},
      {text:'Given a client with 3 active risks, 2 of which have check-in questions, When a check-in is generated for that client, Then the check-in inherits questions from both risks.'},
      {text:'Given a risk with a check-in question that is subsequently resolved (risk closed), When the next check-in is generated, Then the question from the closed risk is no longer included.'},
      {text:'Given a check-in with no risk-based questions (client has no active risks with questions), When the care partner opens the form, Then the questions section is empty but the check-in can still be completed.'}
    ],
    frs:['FR-005','FR-026'],
    deps:['US2']
  },
  {
    id:'US6', title:'Clinical Team Reviews Check-In Responses', priority:'P2',
    actor:'Clinical Team',
    rationale:'Without review capability, the feedback loop is broken. Clinical team needs to see the information gathered against each risk.',
    scenarios:[
      {text:'Given a completed check-in with 2 risk-based questions answered, When a clinical team member views the client\'s check-in history, Then they see each question with its response, grouped by the risk it belongs to.'},
      {text:'Given a client with multiple completed check-ins, When a clinical user views the check-in history, Then they can see how responses to the same risk question have changed over time.'},
      {text:'Given a clinical user, When they filter completed check-ins by date range, Then results match the filter criteria.'}
    ],
    frs:['FR-014'],
    deps:['US5','US2']
  },
  {
    id:'US7', title:'Care Partner Records a Failed Attempt', priority:'P2',
    actor:'Care Partner',
    rationale:'Not every call connects. Without attempt tracking, care partners have no way to show they tried, and overdue check-ins look like inaction.',
    scenarios:[
      {text:'Given a pending check-in, When the care partner records a failed attempt with reason "No answer", Then the attempt is logged with timestamp and reason, and the check-in stays "Pending".'},
      {text:'Given a check-in with 3 failed attempts, When viewed on the dashboard, Then the card shows the attempt count (e.g., "3 attempts").'},
      {text:'Given a check-in with failed attempts, When the care partner eventually reaches the client and completes the check-in, Then both the attempts and the completion are preserved in the record.'}
    ],
    frs:['FR-008','FR-022'],
    deps:['US1']
  },
  {
    id:'US8', title:'Check-In Completion Report', priority:'P2',
    actor:'Team Lead / Manager',
    rationale:'Without reporting, there\'s no way to measure whether check-ins are actually happening. Provides the compliance audit trail and operational visibility the coordination team currently lacks.',
    scenarios:[
      {text:'Given a team lead viewing the report, When they select a time period (e.g., last quarter), Then they see the overall completion rate (% of due check-ins completed on time).'},
      {text:'Given 3 care partners with varying completion rates, When the report is viewed, Then each care partner\'s individual rate is shown with client count and overdue count.'},
      {text:'Given a request for compliance export, When the team lead exports the report, Then a downloadable file is produced with per-client check-in history.'}
    ],
    frs:['FR-015'],
    deps:['US2']
  },
  {
    id:'US9', title:'Ad-Hoc Check-In Creation', priority:'P2',
    actor:'Care Partner / Coordinator',
    rationale:'Scheduled check-ins cover the standard cadence, but real-world care relationships produce unplanned contact. Capturing these ensures a complete engagement record.',
    scenarios:[
      {text:'Given a care partner viewing a client\'s profile, When they create an ad-hoc check-in, Then a new check-in record is created with today\'s date and type "Ad-hoc".'},
      {text:'Given a client with an existing pending scheduled check-in, When an ad-hoc check-in is created and completed, Then the scheduled check-in remains pending and its due date is unchanged.'},
      {text:'Given a completed ad-hoc check-in, When viewing the client\'s check-in history, Then it is clearly distinguished from scheduled check-ins (e.g., labelled "Ad-hoc").'}
    ],
    frs:['FR-017'],
    deps:['US2']
  },
  {
    id:'US10', title:'System Auto-Marks Missed Check-Ins', priority:'P2',
    actor:'System',
    rationale:'Prevents indefinitely-pending check-ins from cluttering dashboards. Creates a clean audit trail distinguishing between completed and missed engagements.',
    scenarios:[
      {text:'Given a pending check-in that is 31 days past its due date, When the auto-mark process runs, Then the check-in status changes to "Missed" and a new check-in is generated with the next due date based on cadence.'},
      {text:'Given a pending check-in that is 29 days past its due date, When the auto-mark process runs, Then the check-in remains "Pending" (not yet Missed).'},
      {text:'Given a check-in marked as Missed, When viewed on the dashboard and in reports, Then it is clearly distinguishable from completed check-ins.'}
    ],
    frs:['FR-003','FR-018','FR-021'],
    deps:['US3']
  },
  {
    id:'US11', title:'Transition from Current System', priority:'P3',
    actor:'System / Team',
    rationale:'The existing system is still partially functional (dashboard shows computed check-ins). A clean transition ensures no data loss and allows rollback if issues arise.',
    scenarios:[
      {text:'Given the feature flag is enabled for a care partner, When they view My Activities, Then check-ins come from the new records, not the package date computation.'},
      {text:'Given a client with an existing check-in date of 2026-01-15, When the migration runs, Then a check-in record is created with the next due date based on that historical date.'},
      {text:'Given the feature flag is disabled, When a care partner views My Activities, Then the existing package-date behaviour is unchanged.'},
      {text:'Given the new system has been running for one full quarter without issues, When the team decides to deprecate the old system, Then the package date fields are no longer updated by new check-in completions.'}
    ],
    frs:['FR-012','FR-020'],
    deps:['US3','US1']
  },
  {

const CAT_COLOURS = {
  'Check-In Types':'#f59e0b','Scheduling':'#3b82f6','Lifecycle':'#22c55e',
  'Completion':'#ef4444','Clinical':'#a855f7','Dashboard':'#ec4899',

// Build reverse FR→story map
const frToStories = {};
FRS.forEach(fr => { frToStories[fr.id] = []; });
STORIES.forEach(s => s.frs.forEach(frId => { if(frToStories[frId]) frToStories[frId].push(s.id); }));

// ============================================================
// STATE
// ============================================================
let selectedStory = null;
let currentTab = 'stories';
let searchQuery = '';
let canvasTransform = {x:0, y:0, scale:1};
let isDragging = false;
let dragTarget = null;
let dragOffset = {x:0,y:0};
let isPanning = false;
let panStart = {x:0,y:0};

// Node positions
const nodePositions = {};
const NODE_W = 240;
const NODE_H = 140;
const LANE_PAD = 40;
const NODE_GAP_X = 40;
const NODE_GAP_Y = 30;

// ============================================================
// LAYOUT
// ============================================================
function layoutNodes() {
  const lanes = {P1:[], P2:[], P3:[]};
  STORIES.forEach(s => lanes[s.priority].push(s));

  let yOffset = 60;
  ['P1','P2','P3'].forEach(p => {
    const stories = lanes[p];
    const cols = Math.min(stories.length, 4);
    stories.forEach((s, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      nodePositions[s.id] = {
        x: LANE_PAD + col * (NODE_W + NODE_GAP_X),
        y: yOffset + LANE_PAD + row * (NODE_H + NODE_GAP_Y)
      };
    });
    const rows = Math.ceil(stories.length / cols);
    yOffset += LANE_PAD * 2 + rows * (NODE_H + NODE_GAP_Y) + 40;
  });
}

// ============================================================
// RENDER CANVAS
// ============================================================
function renderCanvas() {
  const inner = document.getElementById('canvasInner');
  inner.innerHTML = '';

  // Swim lanes
  const lanes = {P1:[], P2:[], P3:[]};
  STORIES.forEach(s => lanes[s.priority].push(s));
  const laneLabels = {P1:'Priority 1 — Critical', P2:'Priority 2 — Important', P3:'Priority 3 — Enhancement'};
  let yOffset = 60;
  ['P1','P2','P3'].forEach(p => {
    const stories = lanes[p];
    if(!stories.length) return;
    const cols = Math.min(stories.length, 4);
    const rows = Math.ceil(stories.length / cols);
    const laneW = cols * (NODE_W + NODE_GAP_X) + LANE_PAD * 2 - NODE_GAP_X + LANE_PAD;
    const laneH = LANE_PAD * 2 + rows * (NODE_H + NODE_GAP_Y) - NODE_GAP_Y + LANE_PAD;
    const lane = document.createElement('div');
    lane.className = 'swim-lane ' + p.toLowerCase();
    lane.style.cssText = `left:0;top:${yOffset}px;width:${laneW}px;height:${laneH}px;`;
    lane.innerHTML = `<div class="swim-lane-label">${laneLabels[p]}</div>`;
    inner.appendChild(lane);
    yOffset += laneH + 40;
  });

  // Story nodes
  STORIES.forEach(s => {
    const pos = nodePositions[s.id];
    const node = document.createElement('div');
    node.className = 'story-node' + (selectedStory === s.id ? ' selected' : '');
    node.dataset.id = s.id;
    node.style.cssText = `left:${pos.x}px;top:${pos.y}px;`;
    node.innerHTML = `
      <div class="priority-stripe ${s.priority.toLowerCase()}"></div>
      <div class="node-body">
        <div class="node-id">${s.id}</div>
        <div class="node-title">${s.title}</div>
        <div class="node-actor">${s.actor}</div>
        <div class="node-stats">
          <span>${s.scenarios.length} ACs</span>
          <span>${s.frs.length} FRs</span>
          ${s.deps.length ? `<span>${s.deps.length} deps</span>` : ''}
        </div>
      </div>
    `;
    node.addEventListener('click', (e) => { if(!isDragging) selectStory(s.id); });
    node.addEventListener('mousedown', startDragNode);
    node.addEventListener('mouseenter', (e) => showTooltip(e, s));
    node.addEventListener('mouseleave', hideTooltip);
    inner.appendChild(node);
  });

  drawArrows();
}

function drawArrows() {
  const svg = document.getElementById('arrowsSvg');
  while(svg.children.length > 1) svg.removeChild(svg.lastChild);

  STORIES.forEach(s => {
    s.deps.forEach(depId => {
      const from = nodePositions[depId];
      const to = nodePositions[s.id];
      if(!from || !to) return;

      const fx = (from.x + NODE_W/2) * canvasTransform.scale + canvasTransform.x;
      const fy = (from.y + NODE_H) * canvasTransform.scale + canvasTransform.y;
      const tx = (to.x + NODE_W/2) * canvasTransform.scale + canvasTransform.x;
      const ty = to.y * canvasTransform.scale + canvasTransform.y;

      const midY = (fy + ty) / 2;
      const isHL = selectedStory && (s.id === selectedStory || depId === selectedStory);
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', `M${fx},${fy} C${fx},${midY} ${tx},${midY} ${tx},${ty}`);
      if(isHL) {
        path.classList.add('highlighted');
        path.setAttribute('marker-end','url(#arrowhead-hl)');
      }
      svg.appendChild(path);
    });
  });
}

// ============================================================
// SIDEBAR
// ============================================================
function renderSidebar() {
  const container = document.getElementById('sidebarContent');
  container.innerHTML = '';
  const q = searchQuery.toLowerCase();

  if(currentTab === 'stories') {
    STORIES.forEach(s => {
      if(q && !s.title.toLowerCase().includes(q) && !s.id.toLowerCase().includes(q) && !s.actor.toLowerCase().includes(q)) return;
      const card = document.createElement('div');
      card.className = 's-card' + (selectedStory === s.id ? ' selected' : '');
      card.innerHTML = `
        <div class="s-card-title"><span class="priority-dot ${s.priority.toLowerCase()}"></span>${s.id}: ${s.title}</div>
        <div class="s-card-meta"><span>${s.actor}</span><span>${s.scenarios.length} ACs</span><span>${s.frs.length} FRs</span></div>
      `;
      card.addEventListener('click', () => selectStory(s.id));
      container.appendChild(card);
    });
  } else if(currentTab === 'requirements') {
    const groups = {};
    FRS.forEach(fr => {
      if(q && !fr.text.toLowerCase().includes(q) && !fr.id.toLowerCase().includes(q) && !fr.cat.toLowerCase().includes(q)) return;
      if(!groups[fr.cat]) groups[fr.cat] = [];
      groups[fr.cat].push(fr);
    });
    Object.keys(groups).forEach(cat => {
      const hdr = document.createElement('div');
      hdr.className = 'fr-group-header';
      hdr.style.background = CAT_COLOURS[cat] || '#475569';
      hdr.textContent = cat + ' (' + groups[cat].length + ')';
      container.appendChild(hdr);
      groups[cat].forEach(fr => {
        const card = document.createElement('div');
        card.className = 'fr-card';
        card.innerHTML = `<span class="fr-id">${fr.id}</span> ${fr.text}`;
        card.addEventListener('click', () => {
          const stories = frToStories[fr.id];
          if(stories.length) selectStory(stories[0]);
        });
        container.appendChild(card);
      });
    });
  } else if(currentTab === 'scenarios') {
    STORIES.forEach(s => {
      s.scenarios.forEach((sc, i) => {
        const text = sc.text;
        if(q && !text.toLowerCase().includes(q) && !s.id.toLowerCase().includes(q)) return;
        const card = document.createElement('div');
        card.className = 'sc-card';
        card.innerHTML = `<div class="sc-parent">${s.id} — ${s.title}</div>${highlightGWT(text)}`;
        card.addEventListener('click', () => selectStory(s.id));
        container.appendChild(card);
      });
    });
  }
}

function highlightGWT(text) {
  return text
    .replace(/\bGiven\b/g, '<span class="kw-given">Given</span>')
    .replace(/\bWhen\b/g, '<span class="kw-when">When</span>')
    .replace(/\bThen\b/g, '<span class="kw-then">Then</span>');
}

// ============================================================
// DETAIL PANEL
// ============================================================
function renderDetail(s) {
  const panel = document.getElementById('detailPanel');
  const scroll = document.getElementById('detailScroll');
  panel.classList.add('open');
  document.getElementById('promptBar').classList.add('detail-open');

  const pColor = s.priority === 'P1' ? 'var(--p1)' : s.priority === 'P2' ? 'var(--p2)' : 'var(--p3)';

  // Find related edge cases
  const titleWords = s.title.toLowerCase().split(/\s+/);
  const relatedEdges = EDGE_CASES.filter(ec => ec.keywords.some(kw => titleWords.some(tw => tw.includes(kw) || kw.includes(tw)) || s.frs.some(fr => ec.a.toLowerCase().includes(fr.toLowerCase()))));

  let html = `
    <div class="detail-header">
      <div class="d-id">${s.id}</div>
      <div class="d-title">${s.title}</div>
      <div class="d-actor">${s.actor}</div>
      <div class="d-priority"><span class="priority-dot ${s.priority.toLowerCase()}"></span> <span style="color:${pColor}">${s.priority}</span></div>
      <div class="d-stats">
        <span>${s.scenarios.length} Scenarios</span>
        <span>${s.frs.length} Requirements</span>
        <span>${s.deps.length} Dependencies</span>
      </div>
    </div>

    <div class="detail-section">
      <h3>Why This Priority</h3>
      <div class="detail-rationale">${s.rationale}</div>
    </div>
  `;

  if(s.deps.length) {
    html += `<div class="detail-section"><h3>Dependencies</h3><div class="detail-deps">`;
    s.deps.forEach(depId => {
      const dep = STORIES.find(st => st.id === depId);
      html += `<div class="detail-dep" onclick="selectStory('${depId}')">${depId}: ${dep ? dep.title : depId}</div>`;
    });
    html += `</div></div>`;
  }

  // Dependents (stories that depend on this one)
  const dependents = STORIES.filter(st => st.deps.includes(s.id));
  if(dependents.length) {
    html += `<div class="detail-section"><h3>Dependents (blocked by this)</h3><div class="detail-deps">`;
    dependents.forEach(d => {
      html += `<div class="detail-dep" onclick="selectStory('${d.id}')">${d.id}: ${d.title}</div>`;
    });
    html += `</div></div>`;
  }

  html += `<div class="detail-section"><h3>Acceptance Scenarios (${s.scenarios.length})</h3>`;
  s.scenarios.forEach((sc, i) => {
    html += `<div class="detail-scenario"><strong>AC ${i+1}:</strong> ${highlightGWT(sc.text)}</div>`;
  });
  html += `</div>`;

  html += `<div class="detail-section"><h3>Functional Requirements</h3><div class="detail-fr-list">`;
  s.frs.forEach(frId => {
    const fr = FRS.find(f => f.id === frId);
    if(!fr) return;
    const col = CAT_COLOURS[fr.cat] || '#475569';
    html += `<div class="detail-fr-badge" style="color:${col};border-color:${col}" title="${fr.text}">${fr.id} — ${fr.cat}</div>`;
  });
  html += `</div></div>`;

  if(relatedEdges.length) {
    html += `<div class="detail-section"><h3>Related Edge Cases</h3>`;
    relatedEdges.forEach(ec => {
      html += `<div class="detail-edge"><div class="edge-q">${ec.q}</div><div class="edge-a">${ec.a}</div></div>`;
    });
    html += `</div>`;
  }

  scroll.innerHTML = html;
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('promptBar').classList.remove('detail-open');
  selectedStory = null;
  renderCanvas();
  renderSidebar();
  updatePrompt();
}

// ============================================================
// SELECT STORY
// ============================================================
function selectStory(id) {
  selectedStory = id;
  const s = STORIES.find(st => st.id === id);
  if(!s) return;
  renderDetail(s);
  renderCanvas();
  renderSidebar();
  updatePrompt();
  flyToNode(id);
}

function flyToNode(id) {
  const pos = nodePositions[id];
  if(!pos) return;
  const area = document.querySelector('.canvas-area');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;
  const targetX = areaW / 2 - (pos.x + NODE_W / 2) * canvasTransform.scale;
  const targetY = areaH / 2 - (pos.y + NODE_H / 2) * canvasTransform.scale;
  canvasTransform.x = targetX;
  canvasTransform.y = targetY;
  applyTransform();
  drawArrows();
}

// ============================================================
// PROMPT
// ============================================================
function updatePrompt() {
  const textEl = document.getElementById('promptText');
  const copyBtn = document.getElementById('promptCopy');
  copyBtn.classList.remove('copied');
  copyBtn.textContent = 'Copy Prompt';

  if(!selectedStory) {
    textEl.textContent = 'Select a story to generate an implementation prompt';
    textEl.classList.remove('has-prompt');
    return;
  }
  textEl.classList.add('has-prompt');
  const s = STORIES.find(st => st.id === selectedStory);
  const prompt = buildPrompt(s);
  textEl.textContent = prompt.substring(0, 200) + '...';
  textEl.dataset.fullPrompt = prompt;
}

function buildPrompt(s) {
  let p = `Implement ${s.id}: ${s.title}\n\n`;
  p += `Actor: ${s.actor}\nPriority: ${s.priority}\n\n`;
  p += `Purpose: ${s.rationale}\n\n`;
  p += `Acceptance Criteria:\n`;
  s.scenarios.forEach((sc, i) => { p += `${i+1}. ${sc.text}\n`; });
  p += `\nFunctional Requirements:\n`;
  s.frs.forEach(frId => {
    const fr = FRS.find(f => f.id === frId);
    if(fr) p += `- ${fr.id}: ${fr.text}\n`;
  });
  if(s.deps.length) {
    p += `\nDependencies: ${s.deps.join(', ')}\n`;
  }
  p += `\nThis is part of the Care Partner Check-Ins (CHK) epic in TC Portal. Uses Inertia v2 + Vue 3 + Tailwind v3. Check-in domain code goes in domain/CheckIn/. Vue pages in resources/js/Pages/. Follow existing Common components from resources/js/Components/Common/.`;
  return p;
}

document.getElementById('promptCopy').addEventListener('click', () => {
  const textEl = document.getElementById('promptText');
  const full = textEl.dataset.fullPrompt;
  if(!full) return;
  navigator.clipboard.writeText(full).then(() => {
    const btn = document.getElementById('promptCopy');
    btn.classList.add('copied');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy Prompt'; }, 2000);
  });
});

// ============================================================
// TOOLTIP
// ============================================================
function showTooltip(e, s) {
  if(isDragging) return;
  const tt = document.getElementById('tooltip');
  const pLabel = s.priority === 'P1' ? 'Critical' : s.priority === 'P2' ? 'Important' : 'Enhancement';
  const pColor = s.priority === 'P1' ? 'var(--p1)' : s.priority === 'P2' ? 'var(--p2)' : 'var(--p3)';
  tt.innerHTML = `
    <div class="tt-title"><span class="priority-dot ${s.priority.toLowerCase()}" style="margin-right:4px"></span>${s.id}: ${s.title}</div>
    <div class="tt-actor">${s.actor} &middot; <span style="color:${pColor}">${s.priority} ${pLabel}</span></div>
    <div class="tt-rationale">${s.rationale}</div>
    <div class="tt-stats">
      <span>${s.scenarios.length} scenarios</span>
      <span>${s.frs.length} FRs</span>
      <span>${s.deps.length} deps</span>
    </div>
  `;
  tt.classList.remove('hidden');
  positionTooltip(e);
}

function positionTooltip(e) {
  const tt = document.getElementById('tooltip');
  let x = e.clientX + 16;
  let y = e.clientY + 16;
  if(x + 320 > window.innerWidth) x = e.clientX - 336;
  if(y + 200 > window.innerHeight) y = e.clientY - 200;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.add('hidden');
}

// ============================================================
// CANVAS INTERACTION
// ============================================================
function applyTransform() {
  const inner = document.getElementById('canvasInner');
  inner.style.transform = `translate(${canvasTransform.x}px,${canvasTransform.y}px) scale(${canvasTransform.scale})`;
}

// Pan
document.getElementById('canvas').addEventListener('mousedown', (e) => {
  if(e.target.closest('.story-node')) return;
  isPanning = true;
  panStart = {x: e.clientX - canvasTransform.x, y: e.clientY - canvasTransform.y};
});

document.addEventListener('mousemove', (e) => {
  if(isPanning) {
    canvasTransform.x = e.clientX - panStart.x;
    canvasTransform.y = e.clientY - panStart.y;
    applyTransform();
    drawArrows();
  }
  if(dragTarget) {
    isDragging = true;
    const x = (e.clientX - canvasTransform.x) / canvasTransform.scale - dragOffset.x;
    const y = (e.clientY - canvasTransform.y) / canvasTransform.scale - dragOffset.y;
    nodePositions[dragTarget] = {x, y};
    const node = document.querySelector(`.story-node[data-id="${dragTarget}"]`);
    if(node) { node.style.left = x + 'px'; node.style.top = y + 'px'; }
    drawArrows();
  }
  if(!document.getElementById('tooltip').classList.contains('hidden')) {
    positionTooltip(e);
  }
});

document.addEventListener('mouseup', () => {
  isPanning = false;
  if(dragTarget) {
    setTimeout(() => { isDragging = false; }, 50);
    dragTarget = null;
  }
});

// Zoom
document.getElementById('canvas').addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.3, Math.min(2.5, canvasTransform.scale * delta));
  const rect = document.querySelector('.canvas-area').getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  canvasTransform.x = mx - (mx - canvasTransform.x) * (newScale / canvasTransform.scale);
  canvasTransform.y = my - (my - canvasTransform.y) * (newScale / canvasTransform.scale);
  canvasTransform.scale = newScale;
  applyTransform();
  drawArrows();
}, {passive: false});

// Drag node
function startDragNode(e) {
  const node = e.target.closest('.story-node');
  if(!node) return;
  const id = node.dataset.id;
  const pos = nodePositions[id];
  dragTarget = id;
  dragOffset = {
    x: (e.clientX - canvasTransform.x) / canvasTransform.scale - pos.x,
    y: (e.clientY - canvasTransform.y) / canvasTransform.scale - pos.y
  };
  e.stopPropagation();
}

// Fit all
document.getElementById('fitBtn').addEventListener('click', fitAll);
document.getElementById('resetBtn').addEventListener('click', () => {
  layoutNodes();
  canvasTransform = {x:40,y:20,scale:1};
  applyTransform();
  renderCanvas();
});

function fitAll() {
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  Object.values(nodePositions).forEach(p => {
    if(p.x < minX) minX = p.x;
    if(p.y < minY) minY = p.y;
    if(p.x + NODE_W > maxX) maxX = p.x + NODE_W;
    if(p.y + NODE_H > maxY) maxY = p.y + NODE_H;
  });
  const area = document.querySelector('.canvas-area');
  const aW = area.clientWidth - 80;
  const aH = area.clientHeight - 100;
  const cW = maxX - minX;
  const cH = maxY - minY;
  const scale = Math.min(aW / cW, aH / cH, 1.2);
  canvasTransform.scale = scale;
  canvasTransform.x = (aW - cW * scale) / 2 + 40 - minX * scale;
  canvasTransform.y = (aH - cH * scale) / 2 + 20 - minY * scale;
  applyTransform();
  drawArrows();
}

// ============================================================
// SIDEBAR TABS & SEARCH
// ============================================================
document.querySelectorAll('.sidebar-tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    renderSidebar();
  });
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderSidebar();
});

document.getElementById('detailClose').addEventListener('click', closeDetail);

layoutNodes();
canvasTransform = {x:40, y:20, scale:1};
renderCanvas();
renderSidebar();
updatePrompt();
applyTransform();
setTimeout(fitAll, 100);
</script>
