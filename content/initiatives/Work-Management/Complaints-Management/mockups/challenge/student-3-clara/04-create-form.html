<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Records — New Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'tc-teal': { 500: '#43C0BE', 700: '#007F7E' },
            'tc-blue': { 700: '#2C4C79' },
          },
          fontFamily: { sans: ['Roboto Flex', 'sans-serif'] },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen flex">

  <!-- Skeleton Sidebar -->
  <aside class="w-60 bg-white border-r border-gray-200 min-h-screen flex-shrink-0 p-4 space-y-3">
    <div class="flex items-center gap-2 mb-6">
      <div class="w-8 h-8 rounded-lg bg-tc-teal-700 flex items-center justify-center text-white text-xs font-bold">TC</div>
      <div class="h-4 w-24 bg-gray-200 rounded animate-pulse"></div>
    </div>
    <div class="space-y-1">
      <div class="h-8 w-full bg-gray-100 rounded-md animate-pulse"></div>
      <div class="h-8 w-full bg-gray-100 rounded-md animate-pulse"></div>
      <div class="h-8 w-full bg-tc-teal-700/10 border-l-2 border-tc-teal-700 rounded-md flex items-center px-3">
        <span class="text-sm font-medium text-tc-teal-700">Feedback Records</span>
      </div>
      <div class="h-8 w-full bg-gray-100 rounded-md animate-pulse"></div>
      <div class="h-8 w-full bg-gray-100 rounded-md animate-pulse"></div>
      <div class="h-8 w-full bg-gray-100 rounded-md animate-pulse"></div>
    </div>
  </aside>

  <!-- Main Content with Modal Overlay -->
  <main class="flex-1 relative min-h-screen">
    <!-- Dimmed Board Background -->
    <div class="absolute inset-0 opacity-30 pointer-events-none p-4">
      <div class="flex gap-4 h-full min-w-max">
        <div class="w-72 flex-shrink-0 space-y-3">
          <div class="px-3 py-2"><span class="text-sm font-semibold text-gray-700">New</span></div>
          <div class="bg-white rounded-lg border border-gray-200 p-3 h-20"></div>
          <div class="bg-white rounded-lg border border-gray-200 p-3 h-20"></div>
        </div>
        <div class="w-72 flex-shrink-0 space-y-3">
          <div class="px-3 py-2"><span class="text-sm font-semibold text-gray-700">Received</span></div>
          <div class="bg-white rounded-lg border border-gray-200 p-3 h-20"></div>
        </div>
        <div class="w-72 flex-shrink-0 space-y-3">
          <div class="px-3 py-2"><span class="text-sm font-semibold text-gray-700">Triage</span></div>
          <div class="bg-white rounded-lg border border-gray-200 p-3 h-20"></div>
        </div>
      </div>
    </div>

    <!-- Modal Overlay -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm flex items-start justify-center pt-12 overflow-y-auto">
      <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl mx-4 mb-12">
        <!-- Modal Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
          <h2 class="text-lg font-semibold text-gray-900">New Feedback Record</h2>
          <button class="w-8 h-8 rounded-lg hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-600 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        <!-- Modal Body -->
        <div class="px-6 py-5 space-y-5">

          <!-- Type Selector (Card-style toggle) -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Record Type</label>
            <div class="grid grid-cols-2 gap-3">
              <button class="p-3 border-2 border-tc-teal-700 bg-tc-teal-700/5 rounded-lg text-left transition">
                <div class="flex items-center gap-2 mb-1">
                  <svg class="w-5 h-5 text-tc-teal-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                  <span class="text-sm font-semibold text-tc-teal-700">Complaint</span>
                </div>
                <p class="text-xs text-gray-500">Full lifecycle with investigation and resolution stages</p>
              </button>
              <button class="p-3 border-2 border-gray-200 rounded-lg text-left hover:border-gray-300 transition">
                <div class="flex items-center gap-2 mb-1">
                  <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                  <span class="text-sm font-semibold text-gray-700">Remediation</span>
                </div>
                <p class="text-xs text-gray-500">Lighter process, convertible to full complaint</p>
              </button>
            </div>
          </div>

          <!-- Subject -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Subject</label>
            <input type="text" placeholder="Brief description of the feedback..." class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-tc-teal-500/30 focus:border-tc-teal-500" value="Medication not administered at correct time">
          </div>

          <!-- Description -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
            <textarea rows="3" placeholder="Detailed description of the feedback or complaint..." class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-tc-teal-500/30 focus:border-tc-teal-500 resize-none">Family contacted us to report that Margaret's evening medication was given 3 hours late on two consecutive nights last week.</textarea>
          </div>

          <!-- Triage Level -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Triage Level</label>
            <div class="flex gap-2">
              <button class="flex-1 py-2 px-3 text-sm font-medium rounded-lg border-2 border-red-300 bg-red-50 text-red-700 transition">
                <span class="flex items-center justify-center gap-1.5">
                  <span class="w-2 h-2 rounded-full bg-red-500"></span> Urgent
                </span>
              </button>
              <button class="flex-1 py-2 px-3 text-sm font-medium rounded-lg border-2 border-gray-200 text-gray-600 hover:border-amber-300 hover:bg-amber-50 hover:text-amber-700 transition">
                <span class="flex items-center justify-center gap-1.5">
                  <span class="w-2 h-2 rounded-full bg-amber-500"></span> Medium
                </span>
              </button>
              <button class="flex-1 py-2 px-3 text-sm font-medium rounded-lg border-2 border-gray-200 text-gray-600 hover:border-gray-300 hover:bg-gray-50 transition">
                <span class="flex items-center justify-center gap-1.5">
                  <span class="w-2 h-2 rounded-full bg-gray-400"></span> Standard
                </span>
              </button>
            </div>
          </div>

          <!-- Two-column row -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Department</label>
              <select class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-tc-teal-500/30 focus:border-tc-teal-500 bg-white">
                <option>Clinical Care</option>
                <option>Lifestyle</option>
                <option>Administration</option>
                <option>Catering</option>
                <option>Facilities</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Assigned Coordinator</label>
              <select class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-tc-teal-500/30 focus:border-tc-teal-500 bg-white">
                <option>Sarah Lee</option>
                <option>Alice Turner</option>
                <option>Robert Baker</option>
                <option>Karen Price</option>
              </select>
            </div>
          </div>

          <!-- Complainant -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Complainant</label>
            <div class="flex gap-3">
              <input type="text" placeholder="Name" class="flex-1 px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-tc-teal-500/30 focus:border-tc-teal-500" value="David Thompson">
              <input type="text" placeholder="Relationship" class="w-36 px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-tc-teal-500/30 focus:border-tc-teal-500" value="Son">
            </div>
          </div>

          <!-- Categories -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Categories</label>
            <div class="flex flex-wrap gap-1.5 mb-2">
              <span class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-medium bg-tc-teal-700/10 text-tc-teal-700 rounded-full">
                Clinical Care
                <button class="hover:text-tc-teal-700/70"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
              </span>
              <span class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-medium bg-tc-teal-700/10 text-tc-teal-700 rounded-full">
                Medication
                <button class="hover:text-tc-teal-700/70"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
              </span>
              <button class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-medium text-gray-400 border border-dashed border-gray-300 rounded-full hover:border-gray-400 hover:text-gray-500">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Add
              </button>
            </div>
          </div>

          <!-- Safety Toggle -->
          <div class="flex items-center justify-between p-3 bg-amber-50 border border-amber-200 rounded-lg">
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-amber-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
              <div>
                <p class="text-sm font-medium text-amber-800">Safety Event</p>
                <p class="text-xs text-amber-600">Mark as SIRS reportable if applicable</p>
              </div>
            </div>
            <button class="w-10 h-6 bg-gray-300 rounded-full relative transition">
              <span class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow transition"></span>
            </button>
          </div>

          <!-- Card Preview -->
          <div>
            <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Card Preview</label>
            <div class="bg-gray-50 rounded-lg p-3 border border-gray-200">
              <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-3 border-l-[3px] border-l-red-500 max-w-[280px]">
                <div class="flex items-center justify-between mb-1.5">
                  <span class="text-xs font-mono text-gray-400">REF-00159</span>
                  <span class="inline-flex items-center gap-1 text-[10px] font-medium text-red-700 bg-red-50 px-1.5 py-0.5 rounded-full">
                    <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Urgent
                  </span>
                </div>
                <p class="text-sm font-medium text-gray-900 line-clamp-2 mb-2">Medication not administered at correct time</p>
                <div class="flex items-center gap-1.5">
                  <div class="w-5 h-5 rounded-full bg-purple-100 text-purple-700 flex items-center justify-center text-[10px] font-bold">SL</div>
                  <span class="text-[10px] text-gray-400">Today</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Stage indicator -->
          <div class="flex items-center gap-2 text-xs text-gray-400">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            This card will be placed in the <span class="font-medium text-gray-600">New</span> column
          </div>
        </div>

        <!-- Modal Footer -->
        <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-200 bg-gray-50 rounded-b-xl">
          <button class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg transition">Cancel</button>
          <button class="inline-flex items-center gap-2 bg-tc-teal-700 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-tc-teal-700/90 transition shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Create Card
          </button>
        </div>
      </div>
    </div>
  </main>

  <script src="viewer-toolbar.js"></script>
</body>
</html>
