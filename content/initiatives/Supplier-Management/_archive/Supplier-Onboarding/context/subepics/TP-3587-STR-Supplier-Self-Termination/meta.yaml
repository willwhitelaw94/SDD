jira_key: TP-3587
title: 'Supplier Self-Termination and Reactivation'
prefix: STR
description: |
  Introduce a Supplier Self-Termination workflow within the Supplier Portal, enabling suppliers
  to deactivate their own profile in a controlled and auditable manner.

  Problem: Suppliers currently have no mechanism to independently terminate (de-activate) or close
  their supplier profile within the Trilogy Care Portal.

  Key components:
  1. Termination Trigger - visible UI option like "Close my Supplier Profile"
  2. Confirmation Flow - mandatory confirmation step with reason dropdown
  3. System Behaviour - profile becomes Terminated/Inactive, notifications sent, audit entry recorded
status: In Progress
priority: Medium
