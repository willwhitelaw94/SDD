<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Mobile Mo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 50: '#F0F4FA', 700: '#2C4C79', 800: '#1E3452', 900: '#101C2D' },
            tc: { teal: '#007F7E', 'teal-light': '#43C0BE', green: '#4DC375', orange: '#FF8F51', red: '#E04B51' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    /* Haptic-style press effect */
    .tap-target { -webkit-tap-highlight-color: transparent; }
    .tap-target:active { transform: scale(0.98); }
  </style>
</head>
<body class="min-h-screen bg-white flex flex-col">

  <!-- Top section — Decorative wave + Logo -->
  <div class="relative bg-navy-700 pt-12 pb-24 px-6 overflow-hidden">
    <!-- Wave SVG decoration -->
    <svg class="absolute bottom-0 left-0 right-0 w-full" viewBox="0 0 1440 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 60L48 54C96 48 192 36 288 42C384 48 480 72 576 78C672 84 768 72 864 60C960 48 1056 36 1152 36C1248 36 1344 48 1392 54L1440 60V120H1392C1344 120 1248 120 1152 120C1056 120 960 120 864 120C768 120 672 120 576 120C480 120 384 120 288 120C192 120 96 120 48 120H0V60Z" fill="white"/>
    </svg>
    <!-- Decorative blobs -->
    <div class="absolute top-0 right-0 w-40 h-40 bg-tc-teal/10 rounded-full -mr-16 -mt-16"></div>
    <div class="absolute bottom-12 left-0 w-24 h-24 bg-white/5 rounded-full -ml-8"></div>

    <div class="relative z-10 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl shadow-xl mb-4">
        <span class="text-navy-700 font-extrabold text-2xl tracking-tight">TC</span>
      </div>
      <h1 class="text-xl font-bold text-white">Supplier Portal</h1>
      <p class="text-sm text-white/60 mt-1">Sign in to continue</p>
    </div>
  </div>

  <!-- Form Section — Full width, no card border -->
  <div class="flex-1 -mt-8 relative z-10 px-5 pb-6">

    <!-- Error banner (hidden by default) -->
    <div id="error-banner" class="hidden mb-5 bg-red-50 border border-red-200 rounded-2xl p-4 flex items-center gap-3">
      <div class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-tc-red" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </div>
      <p class="text-sm text-red-700 font-medium">The email or password you entered is incorrect.</p>
    </div>

    <form class="space-y-5" onsubmit="return false;">
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-semibold text-gray-900 mb-2">Email address</label>
        <input
          type="email"
          id="email"
          placeholder="you@company.com"
          class="tap-target w-full h-14 px-5 bg-gray-50 border-2 border-gray-200 rounded-2xl text-base text-gray-900 placeholder-gray-400 focus:outline-none focus:border-tc-teal focus:ring-4 focus:ring-tc-teal/10 transition"
        >
      </div>

      <!-- Password -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <label for="password" class="text-sm font-semibold text-gray-900">Password</label>
          <a href="#" class="text-sm text-tc-teal font-semibold">Forgot?</a>
        </div>
        <div class="relative">
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            class="tap-target w-full h-14 px-5 pr-14 bg-gray-50 border-2 border-gray-200 rounded-2xl text-base text-gray-900 placeholder-gray-400 focus:outline-none focus:border-tc-teal focus:ring-4 focus:ring-tc-teal/10 transition"
          >
          <button type="button" class="tap-target absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center rounded-xl text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <!-- Spacer for thumb zone -->
      <div class="h-4"></div>

      <!-- Submit — Large touch target, bottom of thumb zone -->
      <button
        type="submit"
        onclick="document.getElementById('error-banner').classList.toggle('hidden')"
        class="tap-target w-full h-14 bg-navy-700 hover:bg-navy-800 active:bg-navy-900 text-white text-base font-bold rounded-2xl transition shadow-xl shadow-navy-700/30 flex items-center justify-center gap-2"
      >
        Sign In
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
      </button>
    </form>

    <!-- Register link -->
    <div class="mt-8 text-center">
      <p class="text-sm text-gray-500">
        New here? <a href="#" class="text-tc-teal font-bold">Create an account</a>
      </p>
    </div>

    <!-- Bottom safe area spacer (for mobile notch) -->
    <div class="h-8"></div>
  </div>

  <script src="viewer-toolbar.js" defer></script>
</body>
</html>
